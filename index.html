<!DOCTYPE html>
<html lang="mr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MilindCorp Dashboard</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./styles.css">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
</head>

<body>
    <header class="app-header">
        <button id="back-btn" class="icon-btn hidden"><i class="fas fa-arrow-left"></i></button>
        <h1 id="app-title">माझे डॅशबोर्ड</h1>
        <button id="home-btn" class="icon-btn"><i class="fas fa-home"></i></button>
    </header>

    <main id="app-content" class="fade-in">
        <!-- Content gets injected here by JS -->
    </main>

    <!-- Modal for Create/Edit -->
    <div id="modal-overlay" class="hidden">
        <div class="modal">
            <h2 id="modal-title">नवीन जोडा</h2>
            <input type="text" id="modal-input" placeholder="नाव लिहा...">
            <!-- Icon picker for Sub-Tabs -->
            <div id="icon-picker" class="hidden">
                <p>आयकॉन निवडा:</p>
                <div class="icon-grid">
                    <i class="fas fa-briefcase selected" data-icon="fas fa-briefcase"></i>
                    <i class="fas fa-laptop" data-icon="fas fa-laptop"></i>
                    <i class="fas fa-chalkboard-user" data-icon="fas fa-chalkboard-user"></i>
                    <i class="fas fa-dumbbell" data-icon="fas fa-dumbbell"></i>
                    <i class="fas fa-om" data-icon="fas fa-om"></i>
                    <i class="fas fa-brain" data-icon="fas fa-brain"></i>
                    <i class="fas fa-piggy-bank" data-icon="fas fa-piggy-bank"></i>
                    <i class="fas fa-home" data-icon="fas fa-home"></i>
                    <i class="fas fa-heart" data-icon="fas fa-heart"></i>
                    <i class="fas fa-book" data-icon="fas fa-book"></i>
                    <i class="fas fa-star" data-icon="fas fa-star"></i>
                    <i class="fas fa-shopping-cart" data-icon="fas fa-shopping-cart"></i>
                    <i class="fas fa-car" data-icon="fas fa-car"></i>
                    <i class="fas fa-plane" data-icon="fas fa-plane"></i>
                    <i class="fas fa-music" data-icon="fas fa-music"></i>
                </div>
            </div>
            <div class="modal-actions">
                <button id="modal-cancel">रद्द करा</button>
                <button id="modal-save" class="primary-btn">सेव्ह करा</button>
            </div>
        </div>
    </div>

    <script src="./app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('Service Worker Registered'))
                .catch(err => console.log('Service Worker Failed', err));
        }
    </script>
</body>

</html>
