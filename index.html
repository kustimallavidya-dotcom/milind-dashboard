<!DOCTYPE html>
<html lang="mr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MilindCorp Dashboard</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#F4F7FE">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./styles.css">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
</head>

<body>
    <!-- Top Header -->
    <header class="app-header">
        <div class="header-content">
            <button id="back-btn" class="glass-btn hidden"><i class="fas fa-chevron-left"></i></button>
            <div class="title-area">
                <h1 id="app-title">MilindCorp</h1>
                <p id="app-subtitle" class="subtitle">तुमचा लाइफ डॅशबोर्ड</p>
            </div>
            <button id="home-btn" class="glass-btn"><i class="fas fa-house"></i></button>
        </div>
    </header>

    <main id="app-content" class="fade-in">
        <!-- Content gets injected here by JS -->
    </main>

    <!-- Modal for Create/Edit -->
    <div id="modal-overlay" class="hidden">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">नवीन जोडा</h2>
                <button id="modal-close-icon" class="icon-btn text-muted"><i class="fas fa-xmark"></i></button>
            </div>

            <div class="input-wrapper">
                <i class="fas fa-pen input-icon"></i>
                <input type="text" id="modal-input" placeholder="येथे नाव लिहा...">
            </div>

            <!-- Icon picker for Sub-Tabs -->
            <div id="icon-picker" class="hidden">
                <p class="picker-label">एक सुंदर आयकॉन निवडा:</p>
                <div class="icon-grid">
                    <div class="icon-box selected" data-icon="fas fa-briefcase"><i class="fas fa-briefcase"></i></div>
                    <div class="icon-box" data-icon="fas fa-laptop"><i class="fas fa-laptop"></i></div>
                    <div class="icon-box" data-icon="fas fa-chart-line"><i class="fas fa-chart-line"></i></div>
                    <div class="icon-box" data-icon="fas fa-dumbbell"><i class="fas fa-dumbbell"></i></div>
                    <div class="icon-box" data-icon="fas fa-om"><i class="fas fa-om"></i></div>
                    <div class="icon-box" data-icon="fas fa-brain"><i class="fas fa-brain"></i></div>
                    <div class="icon-box" data-icon="fas fa-piggy-bank"><i class="fas fa-piggy-bank"></i></div>
                    <div class="icon-box" data-icon="fas fa-house"><i class="fas fa-house"></i></div>
                    <div class="icon-box" data-icon="fas fa-heart"><i class="fas fa-heart"></i></div>
                    <div class="icon-box" data-icon="fas fa-book"><i class="fas fa-book"></i></div>
                    <div class="icon-box" data-icon="fas fa-star"><i class="fas fa-star"></i></div>
                    <div class="icon-box" data-icon="fas fa-cart-shopping"><i class="fas fa-cart-shopping"></i></div>
                    <div class="icon-box" data-icon="fas fa-car"><i class="fas fa-car"></i></div>
                    <div class="icon-box" data-icon="fas fa-plane"><i class="fas fa-plane"></i></div>
                    <div class="icon-box" data-icon="fas fa-music"><i class="fas fa-music"></i></div>
                </div>
            </div>
            <div class="modal-actions">
                <button id="modal-save" class="glow-btn">सेव्ह करा <i class="fas fa-check"></i></button>
            </div>
        </div>
    </div>

    <script src="./app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('Service Worker Registered'))
                .catch(err => console.log('Service Worker Failed', err));
        }
    </script>
</body>

</html>
